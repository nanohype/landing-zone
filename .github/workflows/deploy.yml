name: Deploy

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Target account (e.g., workload-dev, workload-staging, workload-prod, management)"
        required: true
        type: string
        default: "workload-dev"
      region:
        description: "Target region (e.g., us-west-2)"
        required: true
        type: string
        default: "us-west-2"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      component:
        description: "Component to deploy (e.g., network, cluster, or 'all')"
        required: true
        type: string
        default: "all"
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: ${{ inputs.action }} ${{ inputs.environment }}/${{ inputs.component }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "1.0.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Run Terragrunt
        working-directory: live/aws/${{ inputs.account }}/${{ inputs.region }}/${{ inputs.environment }}
        run: |
          if [ "${{ inputs.component }}" = "all" ]; then
            terragrunt run --all --non-interactive -- ${{ inputs.action }}
          else
            cd ${{ inputs.component }}
            terragrunt ${{ inputs.action }}
          fi
