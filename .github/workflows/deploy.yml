name: Deploy

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Target account (e.g., workload-development, workload-staging, workload-production, management)"
        required: true
        type: string
        default: "workload-development"
      region:
        description: "Target region (e.g., us-west-2)"
        required: true
        type: string
        default: "us-west-2"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      component:
        description: "Component to deploy (e.g., network, cluster, or 'all')"
        required: true
        type: string
        default: "all"
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read

# Serialize mutating runs against the same environment/component so two dispatched
# applies (or an apply racing a destroy) can't plan-and-write concurrently against one
# target's state. The group is shared with destroy.yml (same `mutate-<env>-<component>`
# key) so deploy and destroy of the same target queue behind each other too.
# cancel-in-progress is false: never abort an apply mid-flight — let it finish and run
# the next dispatch after.
concurrency:
  group: mutate-${{ inputs.environment }}-${{ inputs.component }}
  cancel-in-progress: false

jobs:
  deploy:
    name: ${{ inputs.action }} ${{ inputs.environment }}/${{ inputs.component }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "1.0.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Run Terragrunt
        working-directory: live/aws/${{ inputs.account }}/${{ inputs.region }}/${{ inputs.environment }}
        run: |
          if [ "${{ inputs.component }}" = "all" ]; then
            terragrunt run --all --non-interactive -- ${{ inputs.action }}
          else
            cd ${{ inputs.component }}
            terragrunt ${{ inputs.action }}
          fi
