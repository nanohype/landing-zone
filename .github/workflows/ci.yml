name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  placeholders:
    name: Zero-placeholder gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/no-placeholders.sh

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - run: tofu fmt -check -recursive components/
      - run: tofu fmt -check -recursive modules/

  # Auto-discovers the matrices from the working tree so new components and
  # new live entries don't need a workflow edit to start getting their own
  # Validate / Plan check. The validate matrix lists every
  # components/<cloud>/<component>/ directory; the plan matrix lists every
  # live/<cloud>/<account>/<region>/<env>/<component>/terragrunt.hcl. Both
  # use `git ls-files` so .terragrunt-cache/ and other gitignored paths are
  # excluded by construction.
  discover:
    name: Discover Matrices
    runs-on: ubuntu-latest
    outputs:
      validate: ${{ steps.matrices.outputs.validate }}
      plan: ${{ steps.matrices.outputs.plan }}
    steps:
      - uses: actions/checkout@v4
      - id: matrices
        run: |
          validate=$(
            git ls-files components/ \
            | awk -F'/' 'NF >= 3 && $2 != "" && $3 != "" { print $2 "/" $3 }' \
            | sort -u \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("/"))
                | map({cloud: .[0], component: .[1]})
              '
          )
          plan=$(
            git ls-files live/ \
            | grep '/terragrunt\.hcl$' \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("/"))
                | map({
                    cloud: .[1],
                    account: .[2],
                    region: .[3],
                    env: .[4],
                    component: .[5]
                  })
              '
          )
          echo "validate=$validate" >> "$GITHUB_OUTPUT"
          echo "plan=$plan" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate (${{ matrix.cloud }}/${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.validate) }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - name: Init and Validate
        working-directory: components/${{ matrix.cloud }}/${{ matrix.component }}
        run: |
          tofu init -backend=false -input=false
          tofu validate

  tflint:
    name: TFLint (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, gcp]
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
      - run: tflint --init --config .tflint-${{ matrix.cloud }}.hcl
      - run: tflint --recursive --config "$PWD/.tflint-${{ matrix.cloud }}.hcl" --chdir=components/${{ matrix.cloud }} --minimum-failure-severity=error

  checkov:
    name: Security Scan (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, gcp]
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: components/${{ matrix.cloud }}/
          framework: terraform
          # HARD gate: any finding not covered by .checkov.yaml fails the
          # build. The deliberately-accepted posture trade-offs (single-region
          # durability, provider-managed encryption, public endpoints with IP
          # allowlists) and checkov false positives are enumerated there as
          # skip-check entries, one line of rationale each — accepted and
          # documented, never silently advisory.
          soft_fail: false
          config_file: .checkov.yaml

  plan:
    name: Plan (${{ matrix.cloud }}/${{ matrix.env }}/${{ matrix.component }})
    needs: [discover, validate]
    runs-on: ubuntu-latest
    # The plan jobs need cloud credentials (vars.AWS_ROLE_ARN and the GCP
    # equivalents). Until those repo variables are set, the plan is
    # advisory: it still runs and surfaces output, but a missing-credentials
    # failure does not block the build. The hard gates are the placeholder
    # check, fmt, validate, tflint, and checkov (checkov gated by the
    # documented skip list in .checkov.yaml).
    continue-on-error: true
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.plan) }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "1.0.8"
          # gruntwork-io/terragrunt-action@v3 manages its own tool versions
          # via mise. Without a mise.toml in the repo it requires tofu_version
          # to be passed explicitly — even though the previous opentofu/setup
          # step put tofu on PATH already.
          tofu_version: "1.11.5"

      # Credential guard. Each cloud's auth step runs only when both the
      # matrix matches AND the corresponding repo variable is set. When
      # unset, the auth step skips and the Plan step below skips with it,
      # so the matrix entry comes back green-skipped rather than red-fail.
      # Set these in repo settings (Actions → Variables) to enable real
      # plans:
      #   AWS: AWS_ROLE_ARN
      #   GCP: GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT
      - name: Configure AWS credentials
        if: matrix.cloud == 'aws' && vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Authenticate to GCP
        if: matrix.cloud == 'gcp' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Detect credential availability
        id: creds
        run: |
          case "${{ matrix.cloud }}" in
            aws) [ -n "${{ vars.AWS_ROLE_ARN }}" ] && echo "available=true" >> "$GITHUB_OUTPUT" || echo "available=false" >> "$GITHUB_OUTPUT" ;;
            gcp) [ -n "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -n "${{ vars.GCP_SERVICE_ACCOUNT }}" ] && echo "available=true" >> "$GITHUB_OUTPUT" || echo "available=false" >> "$GITHUB_OUTPUT" ;;
            *)   echo "available=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Skip notice (no cloud credentials configured)
        if: steps.creds.outputs.available != 'true'
        run: |
          echo "::notice::Skipping plan for ${{ matrix.cloud }}/${{ matrix.env }}/${{ matrix.component }} — cloud credentials not configured in repo Variables."

      - name: Plan
        if: steps.creds.outputs.available == 'true'
        working-directory: live/${{ matrix.cloud }}/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}
        run: terragrunt plan -no-color
