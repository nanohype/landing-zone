name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  placeholders:
    name: Zero-placeholder gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/no-placeholders.sh

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - run: tofu fmt -check -recursive components/
      - run: tofu fmt -check -recursive modules/
      - run: tofu fmt -check -recursive fleet/
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "1.0.8"
          tofu_version: "1.11.5"
      # `tofu fmt` only covers .tf. The Terragrunt HCL layer (live/ includes,
      # _envcommon, generate blocks) drifts unchecked without this gate.
      - run: terragrunt hcl format --check --diff

  # Auto-discovers the matrices from the working tree so new components and
  # new live entries don't need a workflow edit to start getting their own
  # Validate / Plan check. The validate matrix lists every
  # <root>/<cloud>/<component>/ directory across components/, fleet/, and
  # modules/ (the vend roots and shared modules validate alongside the
  # components); the plan matrix lists every
  # live/<cloud>/<account>/<region>/<env>/<component>/terragrunt.hcl. Both
  # use `git ls-files` so .terraform/, .terragrunt-cache/, and other
  # gitignored paths are excluded by construction.
  discover:
    name: Discover Matrices
    runs-on: ubuntu-latest
    outputs:
      validate: ${{ steps.matrices.outputs.validate }}
      plan: ${{ steps.matrices.outputs.plan }}
    steps:
      - uses: actions/checkout@v4
      - id: matrices
        run: |
          validate=$(
            git ls-files components/ fleet/ modules/ \
            | awk -F'/' 'NF >= 3 && $1 != "" && $2 != "" && $3 != "" { print $1 "/" $2 "/" $3 }' \
            | sort -u \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("/"))
                | map({root: .[0], cloud: .[1], component: .[2]})
              '
          )
          plan=$(
            git ls-files live/ \
            | grep '/terragrunt\.hcl$' \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("/"))
                | map({
                    cloud: .[1],
                    account: .[2],
                    region: .[3],
                    env: .[4],
                    component: .[5]
                  })
              '
          )
          echo "validate=$validate" >> "$GITHUB_OUTPUT"
          echo "plan=$plan" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate (${{ matrix.root }}/${{ matrix.cloud }}/${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.validate) }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - name: Init and Validate
        working-directory: ${{ matrix.root }}/${{ matrix.cloud }}/${{ matrix.component }}
        run: |
          tofu init -backend=false -input=false
          tofu validate

  # `tofu test` unit tests. They run at command = plan against dummy/mocked
  # providers (no AWS access), so this is a hard gate on security contracts —
  # the workload-identity trust policy staying Pod-Identity-only, and the
  # agent-iam operator's tenant-role writes staying boundary-gated. Auto-discovers
  # every module AND component that has a tests/ dir so new tests run without a
  # workflow edit.
  test:
    name: Unit Tests (tofu test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - name: tofu test
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r dir; do
            found=1
            echo "::group::tofu test — $dir"
            ( cd "$dir" && tofu init -backend=false -input=false && tofu test )
            echo "::endgroup::"
          done < <(git ls-files 'modules/**/tests/*.tftest.hcl' 'components/**/tests/*.tftest.hcl' | xargs -r -n1 dirname | xargs -r -n1 dirname | sort -u)
          if [ "$found" -eq 0 ]; then
            echo "::error::no unit tests discovered under modules/**/tests/ or components/**/tests/"
            exit 1
          fi

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    # tflint --init fetches the aws ruleset from the GitHub releases API. Without a
    # token that call is UNauthenticated (60/hr per runner IP), so on a shared-IP
    # runner it intermittently 403s ("API rate limit exceeded") and reds the build
    # before any linting runs. github.token authenticates it (5000/hr) — read-only,
    # no extra scope.
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.63.1
      - run: tflint --init --config .tflint-aws.hcl
      - run: tflint --recursive --config "$PWD/.tflint-aws.hcl" --chdir=components/aws --minimum-failure-severity=error
      - run: tflint --recursive --config "$PWD/.tflint-aws.hcl" --chdir=fleet/aws --minimum-failure-severity=error
      - run: tflint --recursive --config "$PWD/.tflint-aws.hcl" --chdir=modules/aws --minimum-failure-severity=error

  checkov:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # HARD gate across every Terraform tree — components, the fleet vend roots,
      # and the shared modules. Any finding not covered by .checkov.yaml fails the
      # build. The deliberately-accepted posture trade-offs (single-region
      # durability, provider-managed encryption, public endpoints with IP
      # allowlists) and checkov false positives are enumerated there as
      # skip-check entries, one line of rationale each — accepted and documented,
      # never silently advisory. The same config_file (its global skip list)
      # applies to all three scans.
      - name: Scan components/aws
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: components/aws/
          framework: terraform
          soft_fail: false
          config_file: .checkov.yaml
      - name: Scan fleet/aws
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: fleet/aws/
          framework: terraform
          soft_fail: false
          config_file: .checkov.yaml
      - name: Scan modules/aws
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/aws/
          framework: terraform
          soft_fail: false
          config_file: .checkov.yaml

  # Credential-less evaluation of every live leaf. `terragrunt render` resolves the
  # full config — includes, functions, and dependency wiring — against mock outputs,
  # so it catches breakage that per-component `tofu validate` cannot see: an
  # unresolvable include function, a config_path that doesn't exist, or a
  # dependency reference into a mock that lacks the key. `--no-auto-init` keeps it
  # fast and offline (dependency output fetches fail straight to the mocks). This is
  # the gate that makes the terragrunt layer fail on a PR instead of at apply time.
  evaluate:
    name: Terragrunt Evaluate (live)
    runs-on: ubuntu-latest
    env:
      TERRAGRUNT_ACCOUNT_ID: "111111111111"
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "1.0.8"
          tofu_version: "1.11.5"
      - name: Render every live leaf
        run: |
          set -uo pipefail
          fail=0
          while IFS= read -r leaf; do
            dir=$(dirname "$leaf")
            if ! ( cd "$dir" && TG_NON_INTERACTIVE=true terragrunt render \
                     --format json --no-auto-init >/dev/null 2>/tmp/render.err ); then
              echo "::error::terragrunt render failed for $dir"
              tail -8 /tmp/render.err | sed 's/^/    /'
              fail=1
            fi
          done < <(git ls-files 'live/**/terragrunt.hcl' | grep '/terragrunt\.hcl$')
          if [ "$fail" -ne 0 ]; then
            echo "One or more live leaves failed terragrunt evaluation (see errors above)."
            exit 1
          fi
          echo "All live leaves evaluate cleanly against their mocks."

  # Guards the dependency mocks: every mock_outputs key must be a real output of the
  # component the dependency points at, so a renamed component output fails here
  # instead of silently resolving to a stale mock value at plan/apply time.
  mock-outputs:
    name: Mock Outputs Cross-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check-mock-outputs.py

  plan:
    name: Plan (${{ matrix.cloud }}/${{ matrix.env }}/${{ matrix.component }})
    needs: [discover, validate]
    runs-on: ubuntu-latest
    # The plan jobs need AWS credentials (vars.AWS_ROLE_ARN). Until that repo
    # variable is set, the plan is
    # advisory: it still runs and surfaces output, but a missing-credentials
    # failure does not block the build. The hard gates are the placeholder
    # check, fmt, validate, tflint, and checkov (checkov gated by the
    # documented skip list in .checkov.yaml).
    continue-on-error: true
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.plan) }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "1.0.8"
          # gruntwork-io/terragrunt-action@v3 manages its own tool versions
          # via mise. Without a mise.toml in the repo it requires tofu_version
          # to be passed explicitly — even though the previous opentofu/setup
          # step put tofu on PATH already.
          tofu_version: "1.11.5"

      # Credential guard. The auth step runs only when the AWS_ROLE_ARN repo
      # variable is set. When unset, the auth step skips and the Plan step
      # below skips with it, so the matrix entry comes back green-skipped
      # rather than red-fail. Set AWS_ROLE_ARN in repo settings
      # (Actions → Variables) to enable real plans.
      - name: Configure AWS credentials
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Detect credential availability
        id: creds
        run: |
          [ -n "${{ vars.AWS_ROLE_ARN }}" ] && echo "available=true" >> "$GITHUB_OUTPUT" || echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Skip notice (no cloud credentials configured)
        if: steps.creds.outputs.available != 'true'
        run: |
          echo "::notice::Skipping plan for ${{ matrix.cloud }}/${{ matrix.env }}/${{ matrix.component }} — AWS credentials not configured in repo Variables."

      - name: Plan
        if: steps.creds.outputs.available == 'true'
        working-directory: live/${{ matrix.cloud }}/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}
        run: terragrunt plan -no-color
