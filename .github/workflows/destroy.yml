name: Destroy

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Target account (e.g., workload-development, workload-staging)"
        required: true
        type: string
        default: "workload-development"
      region:
        description: "Target region (e.g., us-west-2)"
        required: true
        type: string
        default: "us-west-2"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
          - staging
      component:
        description: "Component to destroy (e.g., network, cluster, or 'all')"
        required: true
        type: string
        default: "all"
      confirm:
        description: "Type the environment name to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

# Serialize mutating runs against the same environment/component. The group is shared
# with deploy.yml (same `mutate-<env>-<component>` key) so a destroy can't race a
# deploy of the same target, and two destroys of one target queue rather than both
# tearing down concurrently. cancel-in-progress is false: never abort a destroy
# mid-flight — a partial teardown is worse than a queued one.
concurrency:
  group: mutate-${{ inputs.environment }}-${{ inputs.component }}
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy ${{ inputs.environment }}/${{ inputs.component }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: inputs.confirm == inputs.environment
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "1.0.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Destroy
        working-directory: live/aws/${{ inputs.account }}/${{ inputs.region }}/${{ inputs.environment }}
        run: |
          if [ "${{ inputs.component }}" = "all" ]; then
            terragrunt run --all --non-interactive -- destroy
          else
            cd ${{ inputs.component }}
            terragrunt destroy
          fi
