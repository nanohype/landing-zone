name: Drift Detection

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  detect-drift:
    name: Drift Check (${{ matrix.env }}/${{ matrix.component }})
    runs-on: ubuntu-latest
    # Credential guard, mirroring ci.yml's plan job: skip the whole job (green,
    # not red) until the OIDC role is wired up as the AWS_ROLE_ARN repo variable.
    # Without a role, configure-aws-credentials fails with "Could not load
    # credentials from any providers" — a config gap, not drift. Runs for real
    # once AWS_ROLE_ARN is set in repo settings.
    if: ${{ vars.AWS_ROLE_ARN != '' }}
    # Grant the OIDC token permission at the JOB level, mirroring ci.yml's plan
    # job. aws-actions/configure-aws-credentials needs id-token:write to mint the
    # web-identity token; without it the step fails with "Could not load
    # credentials from any providers". A job-level permissions block replaces the
    # workflow-level one for this job, so all three scopes are restated here —
    # id-token:write for OIDC, contents:read for checkout, issues:write for the
    # Report-drift step that opens/updates the drift issue.
    permissions:
      id-token: write
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { account: workload-prod, region: us-west-2, env: production, component: network }
          - { account: workload-prod, region: us-west-2, env: production, component: cluster }
          - { account: workload-prod, region: us-west-2, env: production, component: cluster-addons }
          - { account: workload-prod, region: us-west-2, env: production, component: cluster-bootstrap }
          - { account: workload-prod, region: us-west-2, env: production, component: dns }
          - { account: workload-prod, region: us-west-2, env: production, component: cost }
          - { account: workload-prod, region: us-west-2, env: production, component: observability }
          - { account: workload-prod, region: us-west-2, env: production, component: secrets }
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          # terragrunt-action@v3 runs tofu inside its own container, so it needs
          # tofu_version told to it directly — the setup-opentofu step above only
          # installs tofu on the runner. Without this the action aborts every run
          # ("No mise.toml found, so 'tofu_version' is required").
          tofu_version: "1.11.5"
          tg_version: "1.0.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Plan
        id: plan
        working-directory: live/aws/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}
        run: |
          set +e
          terragrunt plan -detailed-exitcode -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Report drift
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('live/aws/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... truncated' : plan;

            const title = `Drift detected: ${{ matrix.env }}/${{ matrix.component }}`;
            const body = `## Drift Detection Report\n\n**Account:** ${{ matrix.account }}\n**Region:** ${{ matrix.region }}\n**Environment:** ${{ matrix.env }}\n**Component:** ${{ matrix.component }}\n**Detected:** ${new Date().toISOString()}\n\n<details><summary>Plan output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift'],
              });
            }
