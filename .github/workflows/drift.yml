name: Drift Detection

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  # Auto-discovers the drift matrix from the working tree, mirroring ci.yml's
  # discover job, so a new production/staging live entry starts getting watched
  # without a workflow edit. The matrix is every
  # live/<cloud>/<account>/<region>/<env>/<component>/terragrunt.hcl whose env is
  # production or staging — the two long-lived deployed environments (development is
  # ephemeral, org/hub are management/fleet control planes covered by their own
  # bring-up). Uses `git ls-files` so gitignored caches are excluded by construction.
  discover:
    name: Discover Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: |
          matrix=$(
            git ls-files live/ \
            | grep '/terragrunt\.hcl$' \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("/"))
                | map({
                    cloud: .[1],
                    account: .[2],
                    region: .[3],
                    env: .[4],
                    component: .[5]
                  })
                | map(select(.env == "production" or .env == "staging"))
              '
          )
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  detect-drift:
    name: Drift Check (${{ matrix.env }}/${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: discover
    # Credential guard, mirroring ci.yml's plan job: skip the whole job (green,
    # not red) until the OIDC role is wired up as the AWS_ROLE_ARN repo variable.
    # Without a role, configure-aws-credentials fails with "Could not load
    # credentials from any providers" — a config gap, not drift. Runs for real
    # once AWS_ROLE_ARN is set in repo settings.
    if: ${{ vars.AWS_ROLE_ARN != '' }}
    # Grant the OIDC token permission at the JOB level, mirroring ci.yml's plan
    # job. aws-actions/configure-aws-credentials needs id-token:write to mint the
    # web-identity token; without it the step fails with "Could not load
    # credentials from any providers". A job-level permissions block replaces the
    # workflow-level one for this job, so all three scopes are restated here —
    # id-token:write for OIDC, contents:read for checkout, issues:write for the
    # Report-drift step that opens/updates the drift issue.
    permissions:
      id-token: write
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          # terragrunt-action@v3 runs tofu inside its own container, so it needs
          # tofu_version told to it directly — the setup-opentofu step above only
          # installs tofu on the runner. Without this the action aborts every run
          # ("No mise.toml found, so 'tofu_version' is required").
          tofu_version: "1.11.5"
          tg_version: "1.0.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      # `terragrunt plan -detailed-exitcode` returns three distinct codes, and they
      # mean three different things — conflating them is how drift detection goes
      # dark on the failure mode most likely to actually occur:
      #   0 — no changes (in sync). Nothing to report.
      #   1 — the plan ERRORED (expired auth, a broken/renamed provider, an
      #       unresolvable dependency). This is NOT "no drift" — it means we never
      #       got a real answer. Alert distinctly and fail the job so it goes red.
      #   2 — real drift (the live resources differ from the committed config).
      #       Open/update the drift issue; the job stays green (drift is tracked,
      #       not a CI failure).
      # `set +e` keeps the step from aborting on code 1 before we can branch on it;
      # PIPESTATUS[0] captures terragrunt's code through the `tee` pipe.
      - name: Plan
        id: plan
        working-directory: live/${{ matrix.cloud }}/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}
        run: |
          set +e
          terragrunt plan -detailed-exitcode -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Report drift
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('live/${{ matrix.cloud }}/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... truncated' : plan;

            const title = `Drift detected: ${{ matrix.env }}/${{ matrix.component }}`;
            const body = `## Drift Detection Report\n\n**Account:** ${{ matrix.account }}\n**Region:** ${{ matrix.region }}\n**Environment:** ${{ matrix.env }}\n**Component:** ${{ matrix.component }}\n**Detected:** ${new Date().toISOString()}\n\n<details><summary>Plan output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`;

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift'],
              });
            }

      # A plan ERROR (exit 1) is its own alert — a distinct title + label so it
      # never reads as "no drift". Uses the same open/update idiom as the drift
      # report so a persistently-broken component doesn't spawn an issue per run.
      - name: Report plan error
        if: steps.plan.outputs.exitcode == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('live/${{ matrix.cloud }}/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... truncated' : plan;

            const title = `Drift check error: ${{ matrix.env }}/${{ matrix.component }}`;
            const body = `## Drift Check ERROR\n\nThe drift plan for this component failed to run — this is **not** "no drift", it means the check could not determine drift (expired auth, a broken provider, an unresolvable dependency). Resolve this before trusting the drift status of this component.\n\n**Account:** ${{ matrix.account }}\n**Region:** ${{ matrix.region }}\n**Environment:** ${{ matrix.env }}\n**Component:** ${{ matrix.component }}\n**Detected:** ${new Date().toISOString()}\n\n<details><summary>Plan error output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift-error',
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift-error'],
              });
            }

      # Fail the job on a plan error so the run goes red, not green-with-no-drift.
      # Real drift (exit 2) is reported above and intentionally leaves the job green.
      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "::error::Drift plan for ${{ matrix.env }}/${{ matrix.component }} errored (exit 1) — see the 'Drift check error' issue."
          exit 1
