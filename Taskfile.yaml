version: "3"

vars:
  ACCOUNT: '{{.ACCOUNT | default "workload-development"}}'
  REGION: '{{.REGION | default "us-west-2"}}'
  ENVIRONMENT: '{{.ENVIRONMENT | default "development"}}'
  COMPONENT: '{{.COMPONENT | default "all"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # === Validation ===

  fmt:
    desc: Format all OpenTofu files
    cmds:
      - tofu fmt -recursive components/
      - tofu fmt -recursive modules/
      - tofu fmt -recursive fleet/

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - tofu fmt -check -recursive components/
      - tofu fmt -check -recursive modules/
      - tofu fmt -check -recursive fleet/

  validate:
    desc: Validate every component, fleet vend root, and shared module
    cmds:
      - |
        for dir in components/aws/*/ fleet/aws/*/ modules/aws/*/; do
          name=${dir%/}
          echo "Validating $name..."
          (cd "$dir" && tofu init -backend=false -input=false > /dev/null 2>&1 && tofu validate) || exit 1
        done
        echo "All roots valid."

  lint:
    desc: Run tflint on components, fleet vend roots, and shared modules
    cmds:
      - tflint --init --config "$PWD/.tflint-aws.hcl"
      - tflint --recursive --config "$PWD/.tflint-aws.hcl" --chdir=components/aws --minimum-failure-severity=error
      - tflint --recursive --config "$PWD/.tflint-aws.hcl" --chdir=fleet/aws --minimum-failure-severity=error
      - tflint --recursive --config "$PWD/.tflint-aws.hcl" --chdir=modules/aws --minimum-failure-severity=error

  check:mocks:
    desc: Cross-check dependency mock_outputs keys against real component outputs
    cmds:
      - python3 scripts/check-mock-outputs.py

  test:
    desc: Run the tofu test unit suites (security-contract tests) across modules and components
    cmds:
      - |
        set -euo pipefail
        found=0
        while IFS= read -r dir; do
          found=1
          echo "── tofu test — $dir"
          ( cd "$dir" && tofu init -backend=false -input=false > /dev/null && tofu test )
        done < <(git ls-files 'modules/**/tests/*.tftest.hcl' 'components/**/tests/*.tftest.hcl' | xargs -r -n1 dirname | xargs -r -n1 dirname | sort -u)
        if [ "$found" -eq 0 ]; then
          echo "no tofu test suites found under modules/**/tests/ or components/**/tests/" >&2
          exit 1
        fi
        echo "All tofu test suites passed."

  evaluate:
    desc: Credential-less terragrunt render across every live leaf (config evaluation gate)
    cmds:
      - |
        fail=0
        while IFS= read -r leaf; do
          dir=$(dirname "$leaf")
          if ! (cd "$dir" && TG_NON_INTERACTIVE=true terragrunt render --format json --no-auto-init > /dev/null 2>/tmp/render.err); then
            echo "render FAILED: $dir"; tail -6 /tmp/render.err | sed 's/^/    /'; fail=1
          fi
        done < <(git ls-files 'live/**/terragrunt.hcl' | grep '/terragrunt\.hcl$')
        [ "$fail" -eq 0 ] && echo "All live leaves evaluate cleanly." || exit 1

  # === Planning ===

  plan:
    desc: "Plan for ACCOUNT/REGION/ENVIRONMENT/COMPONENT"
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd live/aws/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}} && terragrunt run --all -- plan
        else
          cd live/aws/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}}/{{.COMPONENT}} && terragrunt plan
        fi

  apply:
    desc: "Apply for ACCOUNT/REGION/ENVIRONMENT/COMPONENT"
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd live/aws/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}} && terragrunt run --all -- apply
        else
          cd live/aws/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}}/{{.COMPONENT}} && terragrunt apply
        fi

  destroy:
    desc: "Destroy for ACCOUNT/REGION/ENVIRONMENT/COMPONENT. With COMPONENT=all, destroys in reverse dependency order."
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd live/aws/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}} && terragrunt run --all -- destroy
        else
          cd live/aws/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}}/{{.COMPONENT}} && terragrunt destroy
        fi

  # === Backend ===

  init-backend:
    desc: "Create the S3 state backend"
    cmds:
      - ./scripts/init-backend-aws.sh

  # === End-to-end (manual, real spend) ===

  e2e:
    desc: |
      MANUAL end-to-end on a REAL AWS account: provision -> install operator ->
      deploy a tenant via GitOps -> assert real-IRSA + cloudgov -> teardown
      (always, even on failure). Real, billable AWS (~$0.30-0.60/run) — run on
      demand only, never scheduled. Requires E2E_ACCOUNT_ID; see scripts/e2e.sh
      for the full set of knobs and prereqs.
    cmds:
      - ./scripts/e2e.sh

  # === Help ===

  help:
    desc: Show usage
    cmds:
      - |
        echo ""
        echo "Usage:"
        echo "  task <target> [ACCOUNT=workload-development|workload-staging|workload-production|management] [REGION=us-west-2] [ENVIRONMENT=development|staging|production|org] [COMPONENT=network|cluster|all]"
        echo ""
        task --list
